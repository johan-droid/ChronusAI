name: CI/CD

on:
  push:
    branches: ["main"]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      SECRET_KEY: ci-secret-key-please-change
      ENCRYPTION_KEY: aLXaTjWU596yktNxjxwR-UyyZtj7h1lQa6qOvtAcuZs=
      FRONTEND_URL: http://localhost:5173

      # Use SQLite for CI (consistent with local development)
      DATABASE_URL: sqlite+aiosqlite:///./scheduler.db
      REDIS_URL: redis://localhost:6379/0

      OPENAI_API_KEY: sk-ci-dummy
      OPENAI_MODEL: deepseek-chat
      OPENAI_BASE_URL: https://api.deepseek.com

      JWT_SECRET_KEY: ci-jwt-secret
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (Ruff)
        working-directory: backend
        run: ruff check app

      - name: Type check (mypy)
        working-directory: backend
        run: mypy app

      - name: Test (pytest + coverage)
        working-directory: backend
        run: PYTHONPATH=. pytest -q --cov=app --cov-report=term-missing --cov-fail-under=25

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run type-check

  docker-build:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t chronos-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t chronos-frontend:latest ./frontend

