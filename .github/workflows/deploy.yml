name: Deploy Application

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  wait-for-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for backend build
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.ref }}
          check-name: 'build-backend'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Wait for frontend build
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.ref }}
          check-name: 'build-frontend'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  deploy:
    runs-on: ubuntu-latest
    needs: wait-for-builds
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create docker-compose.yml
        run: |
          cat > docker-compose.yml << EOF
          version: '3.8'
          
          services:
            backend:
              image: ghcr.io/${{ github.repository_owner }}/chronosai-backend:latest
              container_name: chronosai-backend
              restart: unless-stopped
              environment:
                - DATABASE_URL=postgresql://postgres:password@db:5432/chronosai
                - REDIS_URL=redis://redis:6379
                - OPENAI_API_KEY=\${OPENAI_API_KEY}
                - OPENAI_BASE_URL=https://api.deepseek.com
                - SECRET_KEY=\${SECRET_KEY}
              depends_on:
                - db
                - redis
              networks:
                - chronosai-network

            frontend:
              image: ghcr.io/${{ github.repository_owner }}/chronosai-frontend:latest
              container_name: chronosai-frontend
              restart: unless-stopped
              ports:
                - "80:80"
              depends_on:
                - backend
              networks:
                - chronosai-network

            db:
              image: postgres:15
              container_name: chronosai-db
              restart: unless-stopped
              environment:
                - POSTGRES_DB=chronosai
                - POSTGRES_USER=postgres
                - POSTGRES_PASSWORD=password
              volumes:
                - postgres_data:/var/lib/postgresql/data
              networks:
                - chronosai-network

            redis:
              image: redis:7-alpine
              container_name: chronosai-redis
              restart: unless-stopped
              networks:
                - chronosai-network

          volumes:
            postgres_data:

          networks:
            chronosai-network:
              driver: bridge
          EOF

      - name: Create deployment script
        run: |
          cat > deploy.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "🚀 Deploying ChronosAI Application..."
          
          # Stop existing containers
          docker-compose down || true
          
          # Pull latest images
          docker-compose pull
          
          # Start services
          docker-compose up -d
          
          # Wait for services to be healthy
          echo "⏳ Waiting for services to start..."
          sleep 30
          
          # Check service health
          docker-compose ps
          
          echo "✅ Deployment completed successfully!"
          echo "🌐 Frontend: http://localhost"
          echo "🔧 Backend API: http://localhost/api/v1"
          echo "📊 Logs: docker-compose logs -f"
          EOF
          chmod +x deploy.sh

      - name: Create production Dockerfile for unified deployment
        run: |
          cat > Dockerfile.production << 'EOF'
          # Multi-stage build for production
          FROM ghcr.io/${{ github.repository_owner }}/chronosai-backend:latest as backend
          FROM ghcr.io/${{ github.repository_owner }}/chronosai-frontend:latest as frontend
          
          # Final stage with nginx reverse proxy
          FROM nginx:alpine
          
          # Copy nginx configuration
          COPY nginx.conf /etc/nginx/nginx.conf
          
          # Copy frontend build
          COPY --from=frontend /usr/share/nginx/html /usr/share/nginx/html
          
          # Expose port
          EXPOSE 80
          
          # Start nginx
          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Create nginx configuration
        run: |
          cat > nginx.conf << 'EOF'
          events {
              worker_connections 1024;
          }
          
          http {
              upstream backend {
                  server backend:8000;
              }
              
              server {
                  listen 80;
                  server_name localhost;
                  
                  # Frontend
                  location / {
                      root /usr/share/nginx/html;
                      index index.html index.htm;
                      try_files $uri $uri/ /index.html;
                  }
                  
                  # Backend API
                  location /api/ {
                      proxy_pass http://backend/api/;
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                  }
                  
                  # Health check
                  location /health {
                      access_log off;
                      return 200 "healthy\n";
                      add_header Content-Type text/plain;
                  }
              }
          }
          EOF

      - name: Build and push unified production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chronosai:latest
            ghcr.io/${{ github.repository_owner }}/chronosai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Deployment summary
        run: |
          echo "🎉 Deployment Ready!"
          echo ""
          echo "📦 Available Images:"
          echo "  Backend: ghcr.io/${{ github.repository_owner }}/chronosai-backend:latest"
          echo "  Frontend: ghcr.io/${{ github.repository_owner }}/chronosai-frontend:latest"
          echo "  Unified: ghcr.io/${{ github.repository_owner }}/chronosai:latest"
          echo ""
          echo "🚀 Deployment Options:"
          echo "  1. Use docker-compose.yml for full stack deployment"
          echo "  2. Use unified image for single container deployment"
          echo "  3. Deploy to any platform supporting Docker images"
