[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_unused_ignores = False
no_implicit_optional = False
check_untyped_defs = False
disallow_untyped_defs = False

# Ignore specific error types for CI compatibility
[mypy-app.services.ai_scheduling_service.*]
ignore_errors = True

[mypy-app.services.outlook_calendar.*]
ignore_errors = True

[mypy-app.services.google_calendar.*]
ignore_errors = True

[mypy-app.core.security.*]
ignore_errors = True

[mypy-app.api.v1.chat.*]
ignore_errors = True

[mypy-app.api.v1.auth.*]
ignore_errors = True

[mypy-app.api.v1.calendar.*]
ignore_errors = True

