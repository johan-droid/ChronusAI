services:
  - type: web
    name: chronusai-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt && chmod +x start.sh
    startCommand: ./start.sh
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: 60
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./scheduler.db
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: deepseek-chat
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://chronusai.onrender.com/api/v1/auth/google/callback
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_REDIRECT_URI
        value: https://chronusai.onrender.com/api/v1/auth/outlook/callback
      - key: MICROSOFT_TENANT_ID
        value: common
      - key: FRONTEND_URL
        value: https://chronusai.netlify.app
