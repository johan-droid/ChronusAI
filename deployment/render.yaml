services:
  # Backend API
  - type: web
    name: chronosai-backend
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./scheduler.db
      - key: REDIS_URL
        fromService:
          name: chronosai-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: deepseek-chat
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false

  # Redis Cache
  - type: redis
    name: chronusai-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
