# DigitalOcean App Platform Specification
# Deploy with: doctl apps create --spec do-app-spec.yaml
# Update with: doctl apps update <app-id> --spec do-app-spec.yaml

name: calendar-scheduler

region: nyc

# Database component (managed PostgreSQL)
databases:
  - name: db
    engine: PG
    version: "15"
    size: db-s-dev-database
    num_nodes: 1

# Services
services:
  # Backend API Service
  - name: backend
    github:
      repo: johan-droid/ChronosAI
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/v1/health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      # Database URL - automatically injected by DO
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_REDIRECT_URI
        scope: RUN_TIME
        value: ${APP_URL}/api/v1/auth/google/callback
      # Microsoft OAuth
      - key: MICROSOFT_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: MICROSOFT_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: MICROSOFT_REDIRECT_URI
        scope: RUN_TIME
        value: ${APP_URL}/api/v1/auth/outlook/callback
      # Security
      - key: JWT_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      # OpenAI / DeepSeek
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: OPENAI_BASE_URL
        scope: RUN_TIME
        value: https://api.deepseek.com
      # App settings
      - key: APP_ENV
        scope: RUN_TIME
        value: production
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: ${APP_URL}
    routes:
      - path: /api
        preserve_path_prefix: true

  # Frontend Static Site
  - name: frontend
    github:
      repo: johan-droid/ChronosAI
      branch: main
      deploy_on_push: true
    source_dir: frontend
    dockerfile_path: Dockerfile
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: PORT
        scope: RUN_TIME
        value: "80"
      - key: BACKEND_URL
        scope: RUN_TIME
        value: ${backend.PRIVATE_URL}
    routes:
      - path: /
        preserve_path_prefix: true

# Job for database migrations (runs on deploy)
jobs:
  - name: db-migrate
    github:
      repo: johan-droid/ChronosAI
      branch: main
    source_dir: backend
    dockerfile_path: Dockerfile
    kind: PRE_DEPLOY
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
    run_command: alembic upgrade head

# Alerts (optional)
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
