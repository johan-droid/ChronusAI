version: '3.9'

services:
  backend-test:
    build: ./backend
    environment:
      - APP_ENV=test
      - DATABASE_URL=sqlite+aiosqlite:///./test_scheduler.db
      - REDIS_URL=redis://redis-test:6379/0
      - SECRET_KEY=test-secret-key
      - ENCRYPTION_KEY=test-encryption-key
      - JWT_SECRET_KEY=test-jwt-secret
      - OPENAI_API_KEY=test-key
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - redis-test
    volumes:
      - ./backend:/app
      - test_reports:/app/test-reports
    command: pytest -q --cov=app --cov-report=xml --cov-report=html --junitxml=test-reports/junit.xml
    networks:
      - test-network

  frontend-test:
    build: ./frontend
    environment:
      - NODE_ENV=test
      - VITE_API_URL=http://backend-test:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run test:ci
    networks:
      - test-network

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  # E2E Testing with Playwright
  e2e-test:
    image: mcr.microsoft.com/playwright:v1.40.0-focal
    environment:
      - BASE_URL=http://frontend-test:5173
      - API_URL=http://backend-test:8000
    depends_on:
      - backend-test
      - frontend-test
    volumes:
      - ./e2e:/app/e2e
      - e2e_reports:/app/test-results
    command: npx playwright test --reporter=junitxml --reporter=html --output-dir=test-results
    networks:
      - test-network
    profiles:
      - e2e

volumes:
  test_reports:
  e2e_reports:

networks:
  test-network:
    driver: bridge
